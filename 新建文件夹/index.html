<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>镜语 · 摄影集</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0a0a0a;--surface:#111;--border:rgba(255,255,255,0.07);
    --text:#f0ece4;--text2:rgba(240,236,228,0.45);--text3:rgba(240,236,228,0.22);
    --accent:#c9a96e;--ease:cubic-bezier(0.16,1,0.3,1);
  }

  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;font-weight:200}

  /* ===== Osmanthus Particles Canvas ===== */
  #osmanthus-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

  /* ===== Layer System ===== */
  .layer{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:1;opacity:0;visibility:hidden;transition:opacity .8s var(--ease),visibility .8s,transform .6s var(--ease);
  }
  .layer.active{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
  .layer.exit-up{opacity:0;transform:translateY(-20px) scale(0.97)}
  .layer.exit-down{opacity:0;transform:translateY(20px) scale(0.97)}

  /* ===== LAYER 1 — Entrance ===== */
  #layer1{background:url('bg/bg-layer1.jpg') center/cover no-repeat}
  #layer1::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.38);z-index:0}
  .l1-content{position:relative;z-index:1;text-align:center}
  .l1-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,12vw,9rem);font-weight:300;letter-spacing:0.08em;line-height:0.9;animation:fadeUp 1.2s .3s var(--ease) both}
  .l1-title em{color:var(--accent);font-style:italic}
  .l1-sub{font-size:clamp(0.65rem,1.2vw,0.8rem);letter-spacing:0.5em;text-transform:uppercase;color:var(--text2);margin-top:20px;animation:fadeUp 1s .7s var(--ease) both}
  .l1-btn{margin-top:48px;padding:14px 48px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Noto Serif SC',serif;font-size:0.8rem;letter-spacing:0.3em;cursor:pointer;transition:all .35s;position:relative;overflow:hidden;animation:fadeUp 1s 1.1s var(--ease) both}
  .l1-btn::before{content:'';position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease);z-index:-1}
  .l1-btn:hover{color:var(--bg)}
  .l1-btn:hover::before{transform:scaleX(1)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* ===== LAYER 2 — Series Navigation ===== */
  #layer2{background:url('bg/bg-layer2.jpg') center/cover no-repeat}
  #layer2::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:0}
  .l2-content{position:relative;z-index:1;text-align:center;width:100%;max-width:900px;padding:0 24px}
  .l2-header{margin-bottom:clamp(32px,6vh,56px)}
  .l2-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;letter-spacing:0.12em}
  .l2-sub{font-size:0.6rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--accent);margin-top:8px}
  .l2-grid{display:grid;gap:clamp(12px,2vw,20px)}
  .l2-row{display:grid;gap:clamp(12px,2vw,20px)}
  .l2-row-top{grid-template-columns:repeat(4,1fr)}
  .l2-row-bottom{grid-template-columns:repeat(3,1fr);max-width:calc(75% + clamp(12px,2vw,20px)*2);margin:0 auto}
  .l2-card{position:relative;aspect-ratio:3/4;background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .4s var(--ease)}
  .l2-card:hover{transform:translateY(-4px) scale(1.03);border-color:var(--accent);box-shadow:0 12px 40px rgba(201,169,110,0.12)}
  .l2-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,169,110,0.08) 0%,transparent 70%);opacity:0;transition:opacity .4s}
  .l2-card:hover::before{opacity:1}
  .l2-card-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:300;letter-spacing:0.15em;color:var(--text);position:relative;z-index:1;transition:color .3s}
  .l2-card:hover .l2-card-name{color:var(--accent)}
  .l2-card-num{position:absolute;top:12px;right:14px;font-family:'Cormorant Garamond',serif;font-size:0.65rem;font-style:italic;color:var(--text3);z-index:1;transition:color .3s}
  .l2-card:hover .l2-card-num{color:var(--accent)}

  /* ===== LAYER 3 — Gallery ===== */
  #layer3{z-index:2;justify-content:flex-start;padding-top:0}
  #layer3::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:0}
  .l3-topbar{position:relative;z-index:3;width:100%;display:flex;align-items:center;justify-content:space-between;padding:20px clamp(20px,4vw,48px)}
  .l3-back{background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 20px;font-family:'Noto Serif SC',serif;font-size:0.7rem;letter-spacing:0.2em;cursor:pointer;transition:all .3s;border-radius:2px}
  .l3-back:hover{border-color:var(--accent);color:var(--accent)}
  .l3-series-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,2.5vw,1.8rem);font-weight:300;letter-spacing:0.15em;color:var(--text)}
  .l3-counter{font-size:0.6rem;letter-spacing:0.3em;color:var(--text2)}
  .l3-gallery-wrap{position:relative;z-index:2;width:100%;max-width:1200px;height:clamp(400px,60vh,600px);margin-top:clamp(20px,4vh,40px);padding:0 clamp(20px,4vw,48px)}
  .l3-gallery{width:100%;height:100%;overflow:hidden;cursor:pointer;border-radius:12px;touch-action:pan-x}
  .l3-gallery:active{cursor:grabbing}
  .l3-gallery canvas{display:block;border-radius:12px}

  /* Edge fade */
  .l3-gallery-wrap::before,.l3-gallery-wrap::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:3;pointer-events:none}
  .l3-gallery-wrap::before{left:0;background:linear-gradient(to right,rgba(10,10,10,0.6),transparent);border-radius:12px 0 0 12px}
  .l3-gallery-wrap::after{right:0;background:linear-gradient(to left,rgba(10,10,10,0.6),transparent);border-radius:0 12px 12px 0}

  .l3-hint{position:relative;z-index:2;margin-top:16px;font-size:0.6rem;letter-spacing:0.3em;color:var(--text3);display:flex;align-items:center;gap:8px}
  .l3-hint .arr{animation:arrowPulse 2s ease-in-out infinite}
  .l3-hint .arr:nth-child(2){animation-delay:0.15s}
  .l3-hint .arr:nth-child(3){animation-delay:0.3s}
  @keyframes arrowPulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* Mouse Effect Canvas */
  #mouse-effect-canvas{position:absolute;inset:0;z-index:4;pointer-events:none}

  /* ===== Lightbox ===== */
  #lightbox{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.93);opacity:0;visibility:hidden;transition:opacity .5s var(--ease),visibility .5s;cursor:default}
  #lightbox.open{opacity:1;visibility:visible}
  .lb-img-wrap{max-width:min(92vw,1200px);max-height:88vh;display:flex;align-items:center;justify-content:center}
  #lb-img{max-width:100%;max-height:88vh;object-fit:contain;display:block;box-shadow:0 0 120px rgba(0,0,0,0.8);transform:scale(0.92);opacity:0;transition:transform .5s var(--ease),opacity .4s}
  #lightbox.open #lb-img{transform:scale(1);opacity:1}
  .lb-close{position:fixed;top:24px;right:32px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer;background:transparent;border:none}
  .lb-close svg{stroke:var(--text2);transition:stroke .2s}
  .lb-close:hover svg{stroke:var(--text)}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);z-index:10;color:var(--text2);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
  .lb-nav:hover{background:rgba(255,255,255,0.12);color:var(--accent);transform:translateY(-50%) scale(1.08)}
  .lb-nav.prev{left:20px}
  .lb-nav.next{right:20px}

  /* ===== Responsive ===== */
  @media(max-width:768px){
    .l2-row-top{grid-template-columns:repeat(2,1fr)}
    .l2-row-bottom{grid-template-columns:repeat(2,1fr);max-width:100%}
    .l2-row-bottom .l2-card:last-child{grid-column:span 2;max-width:50%;margin:0 auto}
    .l3-gallery-wrap{height:clamp(280px,45vh,400px)}
    .lb-nav{width:36px;height:36px}
    .lb-nav.prev{left:8px}
    .lb-nav.next{right:8px}
  }
  @media(max-width:768px) and (orientation:portrait){
    .l1-title{font-size:clamp(2.8rem,8vw,4.5rem)}
    .l1-sub{font-size:0.6rem;letter-spacing:0.3em}
    .l1-btn{padding:12px 36px;font-size:0.7rem}
    .l2-grid{gap:10px}
    .l2-card{min-height:100px;aspect-ratio:auto;height:120px}
    .l3-gallery-wrap{height:clamp(180px,35vh,280px)}
    .l3-topbar{padding:12px 16px}
    .l3-back{padding:6px 14px;font-size:0.65rem}
    .l3-series-name{font-size:1rem}
    .l3-hint{font-size:0.55rem;margin-top:8px}
    .lb-nav{width:40px;height:40px}
    .lb-nav.prev{left:8px}
    .lb-nav.next{right:8px}
    .lb-close{top:16px;right:16px}
    #layer3::after{background:rgba(0,0,0,0.55)}
  }
  @media(max-width:480px){
    .l2-row-top,.l2-row-bottom{grid-template-columns:repeat(2,1fr)}
    .l2-row-bottom .l2-card:last-child{grid-column:span 2;max-width:50%;margin:0 auto}
    .l2-card{min-height:80px;height:100px}
    .l2-card-name{font-size:clamp(1rem,2.5vw,1.4rem)}
    .l3-gallery-wrap{height:clamp(220px,40vh,320px)}
  }
</style>

<!-- Osmanthus Particles -->
<script>
const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0;
(function(){
  const debounce=(fn,ms)=>{let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}};
  const canvas = document.getElementById('osmanthus-canvas');
  const ctx = canvas.getContext('2d');
  let W,H, mouseX=-200, mouseY=-200, mouseOnScreen=false;
  const particles = [];
  const MAX = isTouchDevice?25:60;
  let lastSpawn = 0;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  window.addEventListener('resize',debounce(resize,150));resize();

  document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;mouseOnScreen=true});
  document.addEventListener('mouseleave',()=>{mouseOnScreen=false});
  if(isTouchDevice){
    document.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;mouseOnScreen=true});
    document.addEventListener('touchstart',e=>{mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;mouseOnScreen=true});
    document.addEventListener('touchend',()=>{mouseOnScreen=false});
  }

  function drawOsmanthus(ctx,x,y,s,rot,alpha,color){
    ctx.save();
    ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
    // 4 petals
    for(let i=0;i<4;i++){
      ctx.save();
      ctx.rotate(i*Math.PI/2);
      ctx.beginPath();
      ctx.ellipse(0,-s*0.55,s*0.28,s*0.55,0,0,Math.PI*2);
      ctx.fillStyle=color;
      ctx.fill();
      ctx.restore();
    }
    // center
    ctx.beginPath();ctx.arc(0,0,s*0.18,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,80,0.8)';ctx.fill();
    ctx.restore();
  }

  function spawn(x,y){
    const angle = Math.random()*Math.PI*2;
    const speed = 0.3+Math.random()*0.8;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-0.3-Math.random()*0.5,
      size:8+Math.random()*12,
      rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.04,
      alpha:1,
      decay:0.004+Math.random()*0.008,
      color:`rgba(230,${180+Math.floor(Math.random()*60)},${60+Math.floor(Math.random()*40)},1)`,
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:0.02+Math.random()*0.04
    });
  }

  let lastTime=0;
  function animate(time){
    const dt = Math.min((time-lastTime)/1000,0.1);lastTime=time;
    ctx.clearRect(0,0,W,H);

    // Spawn
    if(mouseOnScreen && time-lastSpawn > (isTouchDevice?200:120)+Math.random()*60){
      spawn(mouseX+ (Math.random()-0.5)*20, mouseY+ (Math.random()-0.5)*20);
      lastSpawn=time;
    }

    // Update & draw
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.wobble+=p.wobbleSpeed;
      p.x+=p.vx+Math.sin(p.wobble)*0.3;
      p.y+=p.vy;
      p.rotation+=p.rotSpeed;
      p.alpha-=p.decay;
      if(p.alpha<=0){particles.splice(i,1);continue}
      drawOsmanthus(ctx,p.x,p.y,p.size,p.rotation,p.alpha,p.color);
    }

    // Cap
    while(particles.length>MAX)particles.shift();

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();
</script>

<!-- Layer Transitions -->
<script>
const l1=document.getElementById('layer1'),l2=document.getElementById('layer2'),l3=document.getElementById('layer3');
let currentLayer='layer1';

function switchLayer(from,to){
  const fromEl=document.getElementById(from),toEl=document.getElementById(to);
  if(!fromEl||!toEl)return;
  fromEl.classList.remove('active');fromEl.classList.add('exit-up');
  setTimeout(()=>{fromEl.classList.remove('exit-up')},800);
  toEl.classList.add('active');
  currentLayer=to;
}

function goToLayer2(){switchLayer('layer1','layer2')}
function goToLayer3(){switchLayer('layer2','layer3')}
function goToLayer2from3(){
  // Destroy gallery first
  if(window._galleryApp){window._galleryApp.destroy();window._galleryApp=null}
  // Hide layer3
  l3.classList.remove('active');
  // Show layer2
  l2.classList.add('active');
  currentLayer='layer2';
}
</script>

function lerp(a,b,t){return a+(b-a)*t}
function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}

// ── Media ──
class Media{
  constructor({geometry,gl,image,index,length,renderer,scene,screen,viewport,bend,borderRadius}){
    this.geometry=geometry;this.gl=gl;this.image=image;this.index=index;this.length=length;
    this.renderer=renderer;this.scene=scene;this.screen=screen;this.viewport=viewport;
    this.bend=bend;this.borderRadius=borderRadius;this.extra=0;
    this.ready=false;
    this.createShader();
  }
  createShader(){
    const img=new Image();if(location.protocol!=='file:')img.crossOrigin='anonymous';img.src=this.image;
    img.onload=()=>{
      // Use the image element directly as WebGL texture — avoids tainted-canvas SecurityError
      // on file:// protocol. OGL's Texture accepts HTMLImageElement natively.
      this.texture=new Texture(this.gl,{image:img,generateMipmaps:false});
      this.program=new Program(this.gl,{
        depthTest:false,depthWrite:false,
        vertex:`precision highp float;attribute vec3 position;attribute vec2 uv;uniform mat4 modelViewMatrix;uniform mat4 projectionMatrix;uniform float uTime;uniform float uSpeed;varying vec2 vUv;void main(){vUv=uv;vec3 p=position;p.z=(sin(p.x*4.0+uTime)*1.5+cos(p.y*2.0+uTime)*1.5)*(0.1+uSpeed*0.5);gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);}`,
        fragment:`precision highp float;uniform vec2 uImageSizes;uniform vec2 uPlaneSizes;uniform sampler2D tMap;uniform float uBorderRadius;varying vec2 vUv;float roundedBoxSDF(vec2 p,vec2 b,float r){vec2 d=abs(p)-b;return length(max(d,vec2(0.0)))+min(max(d.x,d.y),0.0)-r;}void main(){vec2 ratio=vec2(min((uPlaneSizes.x/uPlaneSizes.y)/(uImageSizes.x/uImageSizes.y),1.0),min((uPlaneSizes.y/uPlaneSizes.x)/(uImageSizes.y/uImageSizes.x),1.0));vec2 uv=vec2(vUv.x*ratio.x+(1.0-ratio.x)*0.5,vUv.y*ratio.y+(1.0-ratio.y)*0.5);vec4 color=texture2D(tMap,uv);float d=roundedBoxSDF(vUv-0.5,vec2(0.5-uBorderRadius),uBorderRadius);float alpha=1.0-smoothstep(-0.002,0.002,d);gl_FragColor=vec4(color.rgb,alpha);}`,
        uniforms:{tMap:{value:this.texture},uPlaneSizes:{value:[0,0]},uImageSizes:{value:[img.naturalWidth,img.naturalHeight]},uSpeed:{value:0},uTime:{value:100*Math.random()},uBorderRadius:{value:this.borderRadius}},
        transparent:true
      });
      this.createMesh();
      this.onResize();
      this.ready=true;
    };
    img.onerror=()=>{this.ready=true;};
  }
  createMesh(){
    this.plane=new Mesh(this.gl,{geometry:this.geometry,program:this.program});this.plane.setParent(this.scene);
  }
  onResize({screen,viewport}={}){
    if(!this.plane)return;
    if(screen)this.screen=screen;if(viewport)this.viewport=viewport;
    this.scale=this.screen.height/1500;
    this.plane.scale.y=(this.viewport.height*(900*this.scale))/this.screen.height;
    this.plane.scale.x=(this.viewport.width*(700*this.scale))/this.screen.width;
    this.plane.program.uniforms.uPlaneSizes.value=[this.plane.scale.x,this.plane.scale.y];
    this.padding=2;this.width=this.plane.scale.x+this.padding;
    this.widthTotal=this.width*this.length;this.x=this.width*this.index;
  }
  update(scroll,direction){
    if(!this.ready||!this.plane)return;
    this.plane.position.x=this.x-scroll.current-this.extra;
    const x=this.plane.position.x;
    const H=this.viewport.width/2;
    if(this.bend===0){this.plane.position.y=0;this.plane.rotation.z=0}else{
      const B_abs=Math.abs(this.bend);const R=(H*H+B_abs*B_abs)/(2*B_abs);
      const effectiveX=Math.min(Math.abs(x),H);
      const arc=R-Math.sqrt(R*R-effectiveX*effectiveX);
      if(this.bend>0){this.plane.position.y=-arc;this.plane.rotation.z=-Math.sign(x)*Math.asin(effectiveX/R)}
      else{this.plane.position.y=arc;this.plane.rotation.z=Math.sign(x)*Math.asin(effectiveX/R)}
    }
    this.speed=scroll.current-scroll.last;
    this.program.uniforms.uTime.value+=0.04;this.program.uniforms.uSpeed.value=this.speed;
    const planeOffset=this.plane.scale.x/2,viewportOffset=this.viewport.width/2;
    this.isBefore=this.plane.position.x+planeOffset<-viewportOffset;
    this.isAfter=this.plane.position.x-planeOffset>viewportOffset;
    if(direction==='right'&&this.isBefore){this.extra-=this.widthTotal;this.isBefore=this.isAfter=false}
    if(direction==='left'&&this.isAfter){this.extra+=this.widthTotal;this.isBefore=this.isAfter=false}
  }
}

// ── App ──
class GalleryApp{
  constructor(container,photos){
    this.container=container;this.photos=photos;
    this.scroll={ease:0.05,current:0,target:0,last:0};
    this.scrollSpeed=2;this.lightboxOpen=false;
    this._clickStartX=0;this._clickStartY=0;this._wasClick=false;
    this._lbIndex=1;this._lbTotal=photos.length;
    this.createRenderer();this.createCamera();this.createScene();
    this.onResize();this.createGeometry();this.createMedias();
    this.update();this.addEventListeners();
  }
  createRenderer(){
    this.renderer=new Renderer({alpha:true,antialias:true,dpr:Math.min(window.devicePixelRatio||1,1.5)});
    this.gl=this.renderer.gl;this.gl.clearColor(0,0,0,0);
    this.container.appendChild(this.gl.canvas);
  }
  createCamera(){this.camera=new Camera(this.gl);this.camera.fov=45;this.camera.position.z=20}
  createScene(){this.scene=new Transform()}
  createGeometry(){this.planeGeometry=new Plane(this.gl,{heightSegments:30,widthSegments:80})}
  createMedias(){
    const items=this.photos.map(p=>({image:p,text:''}));
    this.mediasImages=items.concat(items);
    this.medias=this.mediasImages.map((data,i)=>new Media({
      geometry:this.planeGeometry,gl:this.gl,image:data.image,index:i,
      length:this.mediasImages.length,renderer:this.renderer,scene:this.scene,
      screen:this.screen,viewport:this.viewport,bend:1,borderRadius:0.05
    }));
  }
  onTouchDown(e){
    if(e.touches)e.preventDefault();
    if(this.lightboxOpen){this._closeLightbox();return}
    this.isDown=true;this._wasClick=true;
    this._clickStartX=e.touches?e.touches[0].clientX:e.clientX;
    this._clickStartY=e.touches?e.touches[0].clientY:e.clientY;
    this._snapAndCache();this.scroll.position=this.scroll.current;
    this.start=this._clickStartX;
  }
  onTouchMove(e){
    if(!this.isDown)return;
    if(e.touches)e.preventDefault();
    const x=e.touches?e.touches[0].clientX:e.clientX;
    const y=e.touches?e.touches[0].clientY:e.clientY;
    if(Math.abs(x-this._clickStartX)>8||Math.abs(y-this._clickStartY)>8)this._wasClick=false;
    this.scroll.target=this.scroll.position+(this.start-x)*(this.scrollSpeed*0.025);
  }
  onTouchUp(e){
    this.isDown=false;
    if(this._wasClick){this._openLightbox(this._lastSnappedIndex,this._lbTotal);return}
    this.onCheck();
  }
  onWheel(e){
    if(this.lightboxOpen){this._closeLightbox();return}
    const delta=e.deltaY||e.wheelDelta||e.detail;
    this.scroll.target+=(delta>0?this.scrollSpeed:-this.scrollSpeed)*0.2;
    this._snapAndCache();
  }
  _snapAndCache(){
    if(!this.medias||!this.medias[0])return;
    const width=this.medias[0].width,realCount=this._lbTotal;
    const itemIndex=Math.round(this.scroll.target/width);
    const displayIndex=((itemIndex%realCount)+realCount)%realCount+1;
    this._lastSnappedIndex=displayIndex;
    this.scroll.target=width*itemIndex;
    const counterEl=document.getElementById('l3Counter');
    if(counterEl)counterEl.textContent=displayIndex+' / '+realCount;
  }
  onCheck(){this._snapAndCache()}
  _openLightbox(idx,total){
    this._lbIndex=idx;this._lbTotal=total;
    this._lbShow(idx);
    document.getElementById('lightbox').classList.add('open');
    this.lightboxOpen=true;
    document.body.style.overflow='hidden';
  }
  _closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
    this.lightboxOpen=false;
    document.body.style.overflow='';
  }
  _lbShow(displayIndex){
    const srcIndex=((displayIndex-1)%this._lbTotal+this._lbTotal)%this._lbTotal;
    const data=this.mediasImages[srcIndex];
    const lbImg=document.getElementById('lb-img');
    lbImg.style.opacity='0';lbImg.style.transform='scale(0.94)';
    lbImg.src=data.image;
    lbImg.onload=()=>{lbImg.style.opacity='1';lbImg.style.transform='scale(1)'};
  }
  _lbNavigate(dir){
    if(!this.lightboxOpen)return;
    this._lbIndex+=dir;
    if(this._lbIndex<1)this._lbIndex=this._lbTotal;
    if(this._lbIndex>this._lbTotal)this._lbIndex=1;
    this._lastSnappedIndex=this._lbIndex;
    this._lbShow(this._lbIndex);
    const width=this.medias[0].width;
    this.scroll.target=width*(this._lbIndex-1);
  }
  onResize(){
    this.screen={width:this.container.clientWidth,height:this.container.clientHeight};
    this.renderer.setSize(this.screen.width,this.screen.height);
    this.camera.perspective({aspect:this.screen.width/this.screen.height});
    const fov=(this.camera.fov*Math.PI)/180;
    const height=2*Math.tan(fov/2)*this.camera.position.z;
    const width=height*this.camera.aspect;
    this.viewport={width,height};
    if(this.medias)this.medias.forEach(m=>m.onResize({screen:this.screen,viewport:this.viewport}));
  }
  update(){
    this.scroll.current=lerp(this.scroll.current,this.scroll.target,this.scroll.ease);
    const direction=this.scroll.current>this.scroll.last?'right':'left';
    if(this.medias)this.medias.forEach(m=>m.update(this.scroll,direction));
    this.renderer.render({scene:this.scene,camera:this.camera});
    this.scroll.last=this.scroll.current;
    this._raf=requestAnimationFrame(()=>this.update());
  }
  addEventListeners(){
    this._onResize=this.onResize.bind(this);
    this._onWheel=this.onWheel.bind(this);
    this._onTouchDown=this.onTouchDown.bind(this);
    this._onTouchMove=this.onTouchMove.bind(this);
    this._onTouchUp=this.onTouchUp.bind(this);
    window.addEventListener('resize',this._onResize);
    window.addEventListener('wheel',this._onWheel);
    window.addEventListener('mousedown',this._onTouchDown);
    window.addEventListener('mousemove',this._onTouchMove);
    window.addEventListener('mouseup',this._onTouchUp);
    window.addEventListener('touchstart',this._onTouchDown);
    window.addEventListener('touchmove',this._onTouchMove);
    window.addEventListener('touchend',this._onTouchUp);
    // Lightbox controls
    document.getElementById('lbClose').addEventListener('click',()=>this._closeLightbox());
    document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();this._lbNavigate(-1)});
    document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();this._lbNavigate(1)});
    document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)this._closeLightbox()});
    this._lbKeyHandler=e=>{
      if(!this.lightboxOpen)return;
      if(e.key==='Escape')this._closeLightbox();
      if(e.key==='ArrowLeft')this._lbNavigate(-1);
      if(e.key==='ArrowRight')this._lbNavigate(1);
    };
    document.addEventListener('keydown',this._lbKeyHandler);
  }
  destroy(){
    cancelAnimationFrame(this._raf);
    window.removeEventListener('resize',this._onResize);
    window.removeEventListener('wheel',this._onWheel);
    window.removeEventListener('mousedown',this._onTouchDown);
    window.removeEventListener('mousemove',this._onTouchMove);
    window.removeEventListener('mouseup',this._onTouchUp);
    window.removeEventListener('touchstart',this._onTouchDown);
    window.removeEventListener('touchmove',this._onTouchMove);
    window.removeEventListener('touchend',this._onTouchUp);
    document.removeEventListener('keydown',this._lbKeyHandler);
    if(this.renderer&&this.renderer.gl&&this.renderer.gl.canvas.parentNode){
      this.renderer.gl.canvas.parentNode.removeChild(this.renderer.gl.canvas);
    }
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow='';
  }
}

window.openSeries=function(key){
  const s=SERIES[key];if(!s)return;

  if(s.bg)l3.style.backgroundImage=`url('${s.bg}')`;

  // Update name
  document.getElementById('l3SeriesName').textContent=s.name;
  document.getElementById('l3Counter').textContent='1 / '+s.photos.length;
  // Destroy existing gallery
  if(window._galleryApp){window._galleryApp.destroy();window._galleryApp=null}
  // Clear container
  const container=document.getElementById('l3Gallery');container.innerHTML='';
  // Transition
  goToLayer3();
  // Small delay to let DOM settle
  setTimeout(()=>{
    try{
      window._galleryApp=new GalleryApp(container,s.photos);
    }catch(e){
      console.warn('WebGL gallery failed:',e);
      window._galleryApp=null;
    }
    // Fallback: if no canvas after 2s, show CSS gallery
    setTimeout(()=>{
      const canvas=container.querySelector('canvas');
      if(!canvas||canvas.width===0||canvas.height===0){
        showCssFallback(container,s.photos,s.name);
      }
    },2000);
  },300);
};

// CSS fallback when WebGL fails
function showCssFallback(container,photos,name){
  if(window._cssFallbackActive)return;
  window._cssFallbackActive=true;
  container.innerHTML='';
  container.style.cssText='position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;';
  let idx=0;

  img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;transition:opacity .4s;';

    img.src=photos[idx];
    document.getElementById('l3Counter').textContent=(idx+1)+' / '+photos.length;
  }

  const prevBtn=document.createElement('button');

  container.appendChild(prevBtn);container.appendChild(nextBtn);
  prevBtn.onclick=(e)=>{e.stopPropagation();img.style.opacity='0';setTimeout(()=>show(idx-1),200)};
  nextBtn.onclick=(e)=>{e.stopPropagation();img.style.opacity='0';setTimeout(()=>show(idx+1),200)};
  container.onclick=(e)=>{if(e.target===container){img.style.opacity='0';setTimeout(()=>show(idx+1),200)}};
  // Keyboard
  const handler=(e)=>{if(e.key==='ArrowLeft'){img.style.opacity='0';setTimeout(()=>show(idx-1),200)}else if(e.key==='ArrowRight'){img.style.opacity='0';setTimeout(()=>show(idx+1),200)}};
  document.addEventListener('keydown',handler);
  container._keyHandler=handler;
  // Cleanup on destroy
  const origDestroy=window._galleryApp?window._galleryApp.destroy.bind(window._galleryApp):null;
  window._galleryApp={destroy(){document.removeEventListener('keydown',handler);container.innerHTML='';window._cssFallbackActive=false;}};
}

<!-- Mouse Effects System -->
<script>
(function(){
  const canvas=document.getElementById('mouse-effect-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,mx=-100,my=-100,pmx=-100,pmy=-100,moving=false,speed=0,stillTimeout,effect=null;
  const meteors=[],dust=[],rain=[],bubbles=[],petals=[],trail=[];
  let lastMoveTs=0,stillDelay=60;

  function resize(){
    const r=canvas.parentElement.getBoundingClientRect();
    W=canvas.width=r.width;H=canvas.height=r.height;
  }

  // ── 冷飒: 流星 ──
  function spawnMeteor(){
    const a=Math.atan2(my-pmy,mx-pmx);
    meteors.push({
      x:mx,y:my,vx:Math.cos(a)*(3+speed*0.5),vy:Math.sin(a)*(3+speed*0.5),
      life:1,decay:0.015+Math.random()*0.02,len:40+Math.random()*60,size:2+Math.random()*3
    });
  }
  function updateMeteors(){
    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];
      m.x+=m.vx;m.y+=m.vy;m.life-=m.decay;
      if(m.life<=0){meteors.splice(i,1);continue}
      const tl=m.len*m.life,d=Math.hypot(m.vx,m.vy)||1;
      const ex=m.x-m.vx*tl/d*0.8,ey=m.y-m.vy*tl/d*0.8;
      const grad=ctx.createLinearGradient(m.x,m.y,ex,ey);
      grad.addColorStop(0,`rgba(255,255,255,${m.life})`);
      grad.addColorStop(0.3,`rgba(220,200,255,${m.life*0.7})`);
      grad.addColorStop(1,'rgba(180,150,255,0)');
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle=grad;ctx.lineWidth=m.size*m.life;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(ex,ey);ctx.stroke();
      const hg=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.size*4);
      hg.addColorStop(0,`rgba(255,255,255,${m.life*0.9})`);hg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(m.x,m.y,m.size*4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    while(meteors.length>50)meteors.shift();
  }

  // ── 故事: 尘粒 ──
  function spawnDust(n){
    for(let i=0;i<n;i++)dust.push({
      x:mx+(Math.random()-0.5)*10,y:my+(Math.random()-0.5)*10,
      vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8-0.3,
      size:0.5+Math.random()*2.5,life:1,decay:0.005+Math.random()*0.01,alpha:0.15+Math.random()*0.15
    });
  }
  function updateDust(){
    for(let i=dust.length-1;i>=0;i--){
      const d=dust[i];d.x+=d.vx;d.y+=d.vy;d.life-=d.decay;
      if(d.life<=0){dust.splice(i,1);continue}
      ctx.fillStyle=`rgba(255,255,255,${d.alpha*d.life})`;
      ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();
    }
    while(dust.length>120)dust.shift();
  }

  // ── 治愈: 雨丝 ──
  function spawnRain(n){
    for(let i=0;i<n;i++){
      const a=-0.15+(Math.random()-0.5)*0.2,len=8+Math.random()*20;
      rain.push({
        x:mx+(Math.random()-0.5)*15,y:my,vx:Math.sin(a)*1.5,vy:Math.cos(a)*3+Math.random()*2,
        len,a,life:1,decay:0.012+Math.random()*0.02,alpha:0.15+Math.random()*0.1
      });
    }
  }
  function updateRain(){
    for(let i=rain.length-1;i>=0;i--){
      const r=rain[i];r.x+=r.vx;r.y+=r.vy;r.life-=r.decay;
      if(r.life<=0){rain.splice(i,1);continue}
      ctx.save();ctx.globalAlpha=r.alpha*r.life;ctx.strokeStyle='#c8d6e5';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x+Math.sin(r.a)*r.len,r.y+Math.cos(r.a)*r.len);
      ctx.stroke();ctx.restore();
    }
    while(rain.length>100)rain.shift();
  }

  // ── 活力: 泡泡 ──
  const bubbleColors=['rgba(200,230,200,','rgba(255,220,210,','rgba(240,240,200,','rgba(210,225,245,'];
  function spawnBubbles(n){
    if(bubbles.length>=20)return;
    for(let i=0;i<n&&bubbles.length<20;i++){
      const r=5+Math.random()*12,col=bubbleColors[Math.floor(Math.random()*4)];
      bubbles.push({
        x:mx+(Math.random()-0.5)*20,y:my+(Math.random()-0.5)*10,r,
        vx:(Math.random()-0.5)*1.5,vy:-1-Math.random()*2,life:1,decay:0.015+Math.random()*0.02,alpha:0.2+Math.random()*0.2,color:col
      });
    }
  }
  function updateBubbles(){
    for(let i=bubbles.length-1;i>=0;i--){
      const b=bubbles[i];b.x+=b.vx;b.y+=b.vy;b.life-=b.decay;b.r*=0.995;
      if(b.life<=0||b.r<1){bubbles.splice(i,1);continue}
      ctx.save();const a=b.alpha*b.life;
      ctx.fillStyle=b.color+(a*0.5)+')';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      const hg=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
      hg.addColorStop(0,`rgba(255,255,255,${a*0.6})`);hg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=hg;ctx.fill();
      ctx.strokeStyle=`rgba(255,255,255,${a*0.3})`;ctx.lineWidth=0.5;ctx.stroke();ctx.restore();
    }
  }

  // ── 清冷: 光晕 ──
  function updateGlow(){
    if(!moving)return;
    const grad=ctx.createRadialGradient(mx,my,0,mx,my,60);
    grad.addColorStop(0,'rgba(255,255,255,0.15)');grad.addColorStop(0.3,'rgba(220,225,240,0.1)');
    grad.addColorStop(0.6,'rgba(200,210,230,0.04)');grad.addColorStop(1,'rgba(200,210,230,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(mx,my,60,0,Math.PI*2);ctx.fill();
  }

  // ── 离绪: 雾带 ──
  function updateMist(){
    if(!moving)return;
    trail.push({x:mx,y:my,life:1});
    for(let i=trail.length-1;i>=0;i--){
      const t=trail[i];t.life-=0.03;
      if(t.life<=0){trail.splice(i,1);continue}
      ctx.fillStyle=`rgba(180,190,210,${0.15*t.life})`;
      ctx.beginPath();ctx.arc(t.x,t.y,8+(1-t.life)*20,0,Math.PI*2);ctx.fill();
    }
    while(trail.length>30)trail.shift();
  }

  // ── 端庄: 金桂花瓣 ──
  function spawnOsmanthus(){
    const isDark = effect==='lixu'||effect==='qingleng';
    const baseAlpha = isDark ? 0.25 : 0.35;
    const count = speed < 5 ? 4+Math.floor(Math.random()*4) : 2+Math.floor(Math.random()*3);
    const now = Date.now();
    if(now-lastMoveTs>3000) return; // 静止>3秒不生成
    for(let i=0;i<count&&petals.length<70;i++){
      const size = 6+Math.random()*8;
      const a = Math.atan2(my-pmy,mx-pmx)+(Math.random()-0.5)*0.5;
      const v = 0.5+speed*0.1;
      const cluster = Math.random()<0.3;
      petals.push({
        x:mx+(Math.random()-0.5)*12,y:my+(Math.random()-0.5)*12,
        vx:Math.cos(a)*v,vy:Math.sin(a)*v,
        size,life:1,decay:0.0048+Math.random()*0.0028,
        rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.02,
        drift:(Math.random()-0.5)*0.1,alpha:baseAlpha+Math.random()*0.1,
        cluster,clusterSize:cluster?2+Math.floor(Math.random()*3):1
      });
    }
  }
  function updateOsmanthus(){
    for(let i=petals.length-1;i>=0;i--){
      const p=petals[i];
      p.x+=p.vx+p.drift;p.y+=p.vy+0.1;p.rot+=p.rotSpeed;
      p.vx*=0.99;p.vy*=0.99;p.life-=p.decay;
      if(p.life<=0){petals.splice(i,1);continue}
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      const a=p.alpha*p.life;
      if(p.cluster){
        const r=p.size*0.5;
        for(let j=0;j<p.clusterSize;j++){
          const ang=j*(2*Math.PI/p.clusterSize);
          const dx=Math.cos(ang)*r,dy=Math.sin(ang)*r;
          drawPetal(dx,dy,p.size*0.7,a);
        }
      }else{
        drawPetal(0,0,p.size,a);
      }
      ctx.restore();
    }
  }
  function drawPetal(x,y,size,alpha){
    const r=size*0.5;
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2;
      const px=x+Math.cos(a)*r*0.45;
      const py=y+Math.sin(a)*r*0.45;
      const grd=ctx.createRadialGradient(px,py,0,px,py,r*0.42);
      grd.addColorStop(0,`rgba(255,240,195,${alpha*0.85})`);
      grd.addColorStop(0.6,`rgba(245,220,150,${alpha*0.55})`);
      grd.addColorStop(1,`rgba(190,155,105,${alpha*0.05})`);
      ctx.fillStyle=grd;ctx.beginPath();
      ctx.ellipse(px,py,r*0.28,r*0.44,a,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle=`rgba(195,155,85,${alpha*0.5})`;ctx.beginPath();
    ctx.arc(x,y,r*0.12,0,Math.PI*2);ctx.fill();
  }

  // ── Main loop ──
  function animate(){
    ctx.clearRect(0,0,W,H);
    if(!effect){requestAnimationFrame(animate);return}
    switch(effect){
      case 'lengsha':if(moving&&speed>1)spawnMeteor();updateMeteors();break;
      case 'gushi':if(moving)spawnDust(speed>5?1:3);updateDust();break;
      case 'zhiyu':if(moving)spawnRain(speed>8?1:speed>3?2:4);updateRain();break;
      case 'huoli':if(moving)spawnBubbles(speed>10?1:speed>5?2:3);updateBubbles();break;
      case 'qingleng':updateGlow();break;
      case 'lixu':updateMist();break;
      case 'duanzhuang':if(moving)spawnOsmanthus();updateOsmanthus();break;
    }
    requestAnimationFrame(animate);
  }

  document.addEventListener('mousemove',function(e){
    pmx=mx;pmy=my;mx=e.clientX;my=e.clientY;
    speed=Math.hypot(mx-pmx,my-pmy);moving=true;lastMoveTs=Date.now();
    clearTimeout(stillTimeout);stillTimeout=setTimeout(function(){moving=false},stillDelay);
  });

  window.setMouseEffect=function(e){if(isTouchDevice)return;effect=e;trail.length=0;petals.length=0;stillDelay=e==='duanzhuang'?3000:60;resize()};
  resize();window.addEventListener('resize',resize);
  requestAnimationFrame(animate);
})();
</script>

</body>
